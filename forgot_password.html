<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Smart ID</title>
  <link rel="stylesheet" href="css/login.css">
  <style>
    .fp-box {
      max-width: 420px;
      margin: 40px auto;
      background: #fff;
      border-radius: 0px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      padding: 24px;
    }
    .fp-box h2 {
      margin-bottom: 6px;
      font-size: 24px;
      color: #333;
      text-align: center;
    }
    .fp-box p {
      margin-bottom: 18px;
      font-size: 14px;
      color: #666;
      text-align: center;
    }
    .fp-group {
      margin-bottom: 12px;
    }
    .fp-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #444;
      font-weight: 600;
    }
    .fp-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }
    .fp-group input:focus {
      border-color: #6a11cb;
      box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.12);
    }
    .fp-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      margin-top: 6px;
    }
    .fp-back {
      display: block;
      margin-top: 12px;
      text-align: center;
      text-decoration: none;
      color: #6a11cb;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="fp-box">
    <h2>Forgot Password</h2>
    <p>Reset your Smart ID account password</p>

    <form id="forgotForm">
      <div class="fp-group">
        <label for="accountId">ID Number or Email</label>
        <input id="accountId" type="text" placeholder="Enter registered ID/email" required>
      </div>
      <div class="fp-group">
        <label for="newPassword">New Password</label>
        <input id="newPassword" type="password" placeholder="Enter new password" required>
      </div>
      <div class="fp-group">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" placeholder="Confirm new password" required>
      </div>
      <button type="submit" class="fp-btn">Reset Password</button>
    </form>

    <a class="fp-back" href="login.html">Back to Login</a>
  </div>

  <script>
    const BASE_URL = "https://smart-id-backend-3.onrender.com";

    document.getElementById("forgotForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const accountId = document.getElementById("accountId").value.trim().toLowerCase();
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (newPassword.length < 4) {
        alert("Password must be at least 4 characters.");
        return;
      }
      if (newPassword !== confirmPassword) {
        alert("Passwords do not match.");
        return;
      }

      fetch(`${BASE_URL}/api/auth/forgot-password`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          idNumber: accountId,
          newPassword: newPassword
        })
      })
      .then(async (response) => {
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          alert(data.message || "Failed to reset password.");
          return;
        }
        alert("Password reset successful. Please login.");
        window.location.href = "login.html";
      })
      .catch(() => {
        alert("Unable to connect to server. Please try again.");
      });
    });
  </script>
</body>
</html>
